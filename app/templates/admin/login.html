<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Storage Dashboard</title>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <style>
        :root {
            --login-bg: #f5f7fa;
            --login-card-bg: #ffffff;
            --login-text: #333;
            --login-muted: #666;
            --login-border: #e0e0e0;
            --login-shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --login-bg: #0f1117;
            --login-card-bg: #1a1d27;
            --login-text: #e2e8f0;
            --login-muted: #78909c;
            --login-border: #3a3f52;
            --login-shadow: rgba(0, 0, 0, 0.5);
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--login-bg);
            color: var(--login-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .login-container {
            background: var(--login-card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px var(--login-shadow);
            width: 100%;
            max-width: 400px;
            border-bottom: 6px solid #A70240;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            color: #A70240;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: var(--login-muted);
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--login-text);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--login-border);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: var(--login-card-bg);
            color: var(--login-text);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #0098DB;
        }
        
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: #A70240;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: #8a0235;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(167, 2, 64, 0.3);
        }
        
        .alert {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 6px;
            border-left: 4px solid;
        }
        
        .alert-error {
            background: rgba(167, 2, 64, 0.1);
            border-color: #A70240;
            color: #8a0235;
        }

        [data-theme="dark"] .alert-error {
            background: rgba(167, 2, 64, 0.2);
            color: #f06292;
        }
        
        .alert-success {
            background: rgba(190, 214, 0, 0.1);
            border-color: #BED600;
            color: #6a7700;
        }

        [data-theme="dark"] .alert-success {
            background: rgba(190, 214, 0, 0.15);
            color: #c8dc50;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔒 Admin Login</h1>
            <p>Storage Dashboard</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-login">Anmelden</button>
        </form>
    </div>
</body>
</html>
